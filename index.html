<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAMAL PRO ULTRA</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --primary: #f0b90b; --bg: #05080a; --sidebar: #0d1117; --border: #1f2937; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; height: 100vh; overflow: hidden; }
        
        /* شاشەی بارکردنی سەرەتا */
        #loadingOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; }
        .spinner { border: 4px solid rgba(255,255,255,0.1); width: 50px; height: 50px; border-radius: 50%; border-left-color: var(--primary); animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .wrapper { display: flex; height: 100vh; }
        
        /* دیزاینی بەشەکان */
        .col-groups { width: 220px; background: var(--sidebar); border-left: 1px solid var(--border); display: flex; flex-direction: column; }
        .col-channels { width: 300px; background: var(--sidebar); border-left: 1px solid var(--border); display: flex; flex-direction: column; }
        .col-player { flex: 1; background: #000; display: flex; flex-direction: column; padding: 20px; justify-content: center; align-items: center; }
        .header { padding: 15px; font-size: 0.9rem; font-weight: bold; color: var(--primary); border-bottom: 1px solid var(--border); text-align: center; }
        .scrollable { flex: 1; overflow-y: auto; padding: 10px; }
        
        /* ستایلی دوگمەی گرووپەکان */
        .group-btn { width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: none; color: #bbb; cursor: pointer; text-align: right; border-radius: 6px; margin-bottom: 5px; transition: 0.2s; }
        .group-btn:hover { background: rgba(240,185,11,0.2); color: white; }
        .group-btn.active-group { background: var(--primary) !important; color: black !important; font-weight: bold; }

        /* ستایلی کەناڵەکان */
        .chan-card { display: flex; align-items: center; gap: 10px; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 8px; cursor: pointer; margin-bottom: 6px; transition: 0.2s; }
        .chan-card:hover { background: rgba(255,255,255,0.1); }
        .chan-card img { width: 40px; height: 40px; object-fit: contain; background: white; border-radius: 4px; }
        
        .chan-card.active-channel { 
            background: linear-gradient(90deg, rgba(240,185,11,0.25), rgba(240,185,11,0.15)) !important; 
            border-right: 4px solid var(--primary);
            color: var(--primary) !important;
            font-weight: bold;
        }
        
        video { width: 100%; max-width: 800px; aspect-ratio: 16/9; border-radius: 12px; border: 1px solid var(--border); }
        
        /* 🌤️ هێڵی مینیماڵی زانیارییەکان (کەشوهەوا + کاتژمێر + مێژووی هیجری) 🌤️ */
        .info-top-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            background: rgba(13, 17, 23, 0.9);
            border: 1px solid var(--border);
            padding: 8px 24px;
            border-radius: 30px;
            margin-bottom: 15px;
            font-size: 0.9rem;
            color: #ddd;
            flex-wrap: wrap;
        }
        .info-section { display: flex; align-items: center; gap: 8px; }
        .divider { color: var(--border); }
        #weatherMini { transition: opacity 0.4s ease-in-out; }

        @media (max-width: 768px) {
            .wrapper { flex-direction: column; overflow-y: auto; }
            .col-groups, .col-channels { width: 100%; height: 200px; }
        }
    </style>
</head>
<body>

<div id="loadingOverlay">
    <div class="spinner"></div>
    <h2 style="color:var(--primary); margin-top:20px;">KAMAL PRO</h2>
    <p style="font-size:0.8rem; color:#666;">کەمێک چاوەڕێ بکە بۆ بارکردنی کەناڵەکان...</p>
</div>

<div class="wrapper" id="mainApp">
    <div class="col-groups"><div class="header">📁 گرووپەکان</div><div class="scrollable" id="gList"></div></div>
    <div class="col-channels"><div class="header">📺 کەناڵەکان</div><div class="scrollable" id="cList"></div></div>
    
    <div class="col-player">
        
        <div class="info-top-bar">
            <div class="info-section" style="color: var(--primary); font-weight: bold;">
                🕒 <span id="liveClock">00:00:00</span>
            </div>
            
            <span class="divider">|</span>
            
            <div class="info-section" style="color: #6366f1; font-weight: bold;">
                🌙 <span id="hijriDate">بار دەکات...</span>
            </div>
            
            <span class="divider">|</span>
            
            <div id="weatherMini" class="info-section">
                <span id="miniIcon">☀️</span>
                <span id="miniCity" style="font-weight: bold; color: var(--primary);">هەولێر</span>
                <span id="miniTemp" style="font-weight: bold;">26°C</span>
                <span id="miniDesc" style="color: #aaa; font-size: 0.78rem;">(خۆرهەتاو)</span>
            </div>
        </div>

        <video id="player" controls autoplay></video>
        <div id="title" style="margin-top:15px; color:var(--primary); font-weight:bold; font-size:1.2rem;">KAMAL PRO ULTRA</div>
    </div>
</div>

<script>
    const _URL = "aHR0cHM6Ly94dHJlYW0taWUubmV0L2dldC5waHA/dXNlcm5hbWU9aXB0tvIwMjYmcGFzc3dvcmQ9aXB0tvIwMjYmdHlwZT1tM3VfcGx1cw==";
    let allData = [];
    const video = document.getElementById('player');
    let hls = new Hls();
    let currentActiveUrl = "";

    // داتای کەشوهەوا
    const kurdistanWeatherStatic = [
        { name: "هەولێر", temp: "26°C", desc: "خۆرهەتاو", icon: "☀️" },
        { name: "سلێمانی", temp: "23°C", desc: "فێنک", icon: "🍃" },
        { name: "دهۆک", temp: "24°C", desc: "ئاسایی", icon: "🌤️" },
        { name: "کەرکووک", temp: "29°C", desc: "گەرمووخۆش", icon: "☀️" },
        { name: "هەڵەبجە", temp: "22°C", desc: "فێنک", icon: "🍃" }
    ];
    
    let currentCityIndex = 0;

    window.onload = function() {
        startLoading();
        showMiniWeather(0);
        
        // کارپێکردنی کاتژمێر و مێژووی هیجری
        updateClockAndHijri();
        setInterval(updateClockAndHijri, 1000); // چرکە بە چرکە نوێ دەبێتەوە
        
        // ٥ چرکە جارێک گۆڕینی کەشوهەوا
        setInterval(cycleWeather, 5000);
    };

    // فەنکشن بۆ نوێکردنەوەی کات و مێژووی هیجری بە زمانی کوردی
    function updateClockAndHijri() {
        const now = new Date();
        
        // کاتژمێر
        let hours = String(now.getHours()).padStart(2, '0');
        let minutes = String(now.getMinutes()).padStart(2, '0');
        let seconds = String(now.getSeconds()).padStart(2, '0');
        document.getElementById('liveClock').innerText = `${hours}:${minutes}:${seconds}`;
        
        // مێژووی هیجری بە شێوازی فەرمی و جوان
        try {
            const options = { calendar: 'islamic-umalqura', day: 'numeric', month: 'long', year: 'numeric' };
            let hijriStr = new Intl.DateTimeFormat('ar-SA', options).format(now);
            
            // وەرگێڕانی ناوی مانگە عەرەبییەکان بۆ کوردی ئەگەر پێویست بوو
            hijriStr = hijriStr.replace('هـ', 'کۆچی');
            document.getElementById('hijriDate').innerText = hijriStr;
        } catch (e) {
            document.getElementById('hijriDate').innerText = "٧ ذو الحجة ١٤٤٧";
        }
    }

    function showMiniWeather(index) {
        const data = kurdistanWeatherStatic[index];
        document.getElementById('miniCity').innerText = data.name;
        document.getElementById('miniTemp').innerText = data.temp;
        document.getElementById('miniDesc').innerText = "(" + data.desc + ")";
        document.getElementById('miniIcon').innerText = data.icon;
    }

    function cycleWeather() {
        const el = document.getElementById('weatherMini');
        el.style.opacity = 0;
        
        setTimeout(() => {
            currentCityIndex = (currentCityIndex + 1) % kurdistanWeatherStatic.length;
            showMiniWeather(currentCityIndex);
            el.style.opacity = 1;
        }, 400);
    }

    async function startLoading() {
        try {
            const r = await fetch(atob(_URL));
            const d = await r.text();
            parseM3U(d);
            document.getElementById('loadingOverlay').style.display = 'none';
        } catch(e) { 
            document.getElementById('loadingOverlay').innerHTML = "<h3 style='color:red;'>خەتایەک لە هێنانەوەی کەناڵەکان هەیە!</h3>";
        }
    }

    function parseM3U(data) {
        const lines = data.split('\n');
        let obj = {}; allData = []; 
        lines.forEach(l => {
            if(l.startsWith('#EXTINF:')) {
                obj.name = l.split(',')[1] || "Channel";
                const g = l.match(/group-title="([^"]+)"/i);
                const i = l.match(/tvg-logo="([^"]+)"/i);
                obj.group = g ? g[1] : "General";
                obj.logo = i ? i[1] : "";
            } else if(l.startsWith('http')) {
                obj.url = l.trim(); allData.push(obj); obj = {};
            }
        });
        renderG();
        const firstBtn = document.querySelector('.group-btn');
        if(firstBtn) firstBtn.classList.add('active-group');
        renderC(allData);
    }

    function renderG() {
        const gs = ["هەمووی", ...new Set(allData.map(x => x.group))];
        document.getElementById('gList').innerHTML = gs.map(g => `<button class="group-btn" onclick="filter('${g}', this)">${g}</button>`).join('');
    }

    function renderC(list) {
        document.getElementById('cList').innerHTML = list.map(x => {
            const img = (x.logo) ? x.logo : `https://ui-avatars.com/api/?name=${encodeURIComponent(x.name)}&background=f0b90b&color=000&bold=true`;
            const isActive = (x.url === currentActiveUrl) ? 'active-channel' : '';
            return `<div class="chan-card ${isActive}" onclick="play('${x.url}', '${x.name}', this)"><img src="${img}"><span>${x.name}</span></div>`;
        }).join('');
    }

    function play(u, n, element) {
        currentActiveUrl = u;
        document.getElementById('title').innerText = n;
        document.querySelectorAll('.chan-card').forEach(c => c.classList.remove('active-channel'));
        if(element) element.classList.add('active-channel');

        if(Hls.isSupported()) { 
            hls.destroy(); hls = new Hls(); hls.loadSource(u); hls.attachMedia(video); 
            hls.on(Hls.Events.MANIFEST_PARSED,()=>video.play()); 
        }
        else if (video.canPlayType('application/vnd.apple.mpegurl')) { video.src = u; video.play(); }
    }

    function filter(g, btnElement) {
        document.querySelectorAll('.group-btn').forEach(b => b.classList.remove('active-group'));
        if(btnElement) btnElement.classList.add('active-group');
        renderC(g === "هەمووی" ? allData : allData.filter(x => x.group === g));
    }
</script>
</body>
</html>
