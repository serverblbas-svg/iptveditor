<script>
    const video = document.getElementById('videoPlayer');
    let hls = new Hls();
    let allChannels = [];

    // فەرمانی خوێندنەوەی فایلی M3U بە شێوەی ئۆتۆماتیکی
    async function fetchM3U() {
        try {
            const response = await fetch('serverblbas_m3u8.m3u');
            const data = await response.text();
            parseM3U(data);
        } catch (err) {
            console.error("Error loading M3U file:", err);
            document.getElementById('currentChannel').innerText = "هەڵە لە بارکردنی فایلەکە";
        }
    }

    function parseM3U(content) {
        const lines = content.split('\n');
        let currentCh = {};
        
        lines.forEach(line => {
            line = line.trim();
            if (line.startsWith('#EXTINF:')) {
                const nameMatch = line.split(',')[1];
                const groupMatch = line.match(/group-title="([^"]+)"/);
                const logoMatch = line.match(/tvg-logo="([^"]+)"/);
                
                currentCh = {
                    name: nameMatch || "کەناڵی بێ ناو",
                    group: groupMatch ? groupMatch[1] : "گشتی",
                    logo: logoMatch ? logoMatch[1] : "https://logo.m3uassets.com/a.png"
                };
            } else if (line.startsWith('http')) {
                currentCh.url = line;
                allChannels.push(currentCh);
                currentCh = {};
            }
        });
        
        createGroupButtons();
        loadChannels(allChannels);
    }

    function createGroupButtons() {
        const groups = ["ALL", ...new Set(allChannels.map(ch => ch.group))];
        const container = document.getElementById('groupList');
        container.innerHTML = '';
        groups.forEach(g => {
            const btn = document.createElement('button');
            btn.className = 'filter-btn' + (g === "ALL" ? ' active' : '');
            btn.innerText = g === "ALL" ? "هەمووی" : g;
            btn.onclick = (e) => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                filterByGroup(g);
            };
            container.appendChild(btn);
        });
    }

    function loadChannels(filtered) {
        const list = document.getElementById('channelList');
        list.innerHTML = '';
        filtered.forEach(ch => {
            const div = document.createElement('div');
            div.className = 'channel-card';
            div.innerHTML = `
                <img src="${ch.logo}" onerror="this.src='https://logo.m3uassets.com/a.png'">
                <span>${ch.name}</span>
            `;
            div.onclick = () => playStream(ch, div);
            list.appendChild(div);
        });
    }

    function playStream(ch, el) {
        document.querySelectorAll('.channel-card').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('currentChannel').innerText = ch.name;

        if (Hls.isSupported()) {
            hls.destroy();
            hls = new Hls();
            hls.loadSource(ch.url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        } else {
            video.src = ch.url;
            video.play();
        }
    }

    function filterByGroup(group) {
        if (group === 'ALL') loadChannels(allChannels);
        else loadChannels(allChannels.filter(c => c.group === group));
    }

    // دەستپێکردن
    fetchM3U();
</script>
