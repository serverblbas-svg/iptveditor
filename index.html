<!DOCTYPE html>
<html lang="kmr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zaman IPTV Player</title>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { display: flex; flex-direction: column; height: 100vh; background: #121212; color: #fff; }

        /* بەشی سەرەوە: پەخشکەرەکە (Video Player) */
        #top-section { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            background: #000; 
            padding: 10px;
        }
        video { width: 100%; max-width: 800px; height: 100%; max-height: 400px; background: #000; outline: none; border-radius: 8px; }
        #status { margin-top: 8px; color: #00bcd4; font-size: 14px; font-weight: bold; }

        /* بەشی خوارەوە: گرووپەکان و کەناڵەکان */
        #bottom-section { 
            height: 320px; 
            background: #1e1e1e; 
            display: flex; 
            flex-direction: column; 
            border-top: 2px solid #333; 
        }
        
        .controls { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 10px 15px; 
            background: #252525; 
        }
        .header { font-size: 16px; font-weight: bold; color: #00bcd4; }
        #groupSelect { 
            padding: 8px 12px; 
            background: #333; 
            color: #fff; 
            border: 1px solid #444; 
            border-radius: 5px; 
            outline: none;
            font-size: 14px;
        }

        /* لیستی کەناڵەکان و لۆگۆکان بە شێوەی تۆڕی خوارەوە (Grid Layout) */
        #channelList { 
            flex: 1; 
            overflow-y: auto; 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); 
            gap: 10px; 
            padding: 15px; 
            list-style: none; 
        }

        /* شێوازی هەر کارتێکی کەناڵ */
        .channel-item { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            padding: 10px; 
            background: #2a2a2a; 
            border-radius: 8px; 
            cursor: pointer; 
            transition: transform 0.2s, background 0.2s; 
            border: 1px solid #333;
        }
        .channel-item:hover { background: #383838; transform: translateY(-3px); }
        .channel-item img { width: 50px; height: 50px; object-fit: contain; margin-bottom: 8px; background: #121212; border-radius: 6px; padding: 2px; }
        .channel-name { font-size: 12px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; color: #eee; }
    </style>
</head>
<body>

    <!-- بەشی سەرەوە: شاشەی ڤیدیۆ -->
    <div id="top-section">
        <video id="videoPlayer" controls autoplay></video>
        <div id="status">کەناڵێک لە خوارەوە هەڵبژێرە...</div>
    </div>

    <!-- بەشی خوارەوە: گرووپ و لۆگۆکان -->
    <div id="bottom-section">
        <div class="controls">
            <div class="header">ZAMAN IPTV</div>
            <select id="groupSelect" onchange="filterChannels()">
                <option value="ALL">هەموو گرووپەکان (All Groups)</option>
            </select>
        </div>
        <ul id="channelList"></ul>
    </div>

    <script>
        const M3U_URL = "https://xtream-ie.net/get.php?username=serverblbas&password=serverblbas&type=m3u_plus";
        let allChannels = [];

        // ڕاکێشانی فایلی M3U
        fetch(M3U_URL)
            .then(res => res.text())
            .then(data => {
                parseM3U(data);
                document.getElementById('status').innerText = "کەناڵەکان بارکران. کلیک لە هەریەکەیان بکه بۆ پەخشکردن.";
            })
            .catch(err => {
                document.getElementById('status').innerText = "کێشە لە وەرگرتنی لیستەکە هەیە (Network / CORS Error).";
            });

        // شیکردنەوەی فایلی M3U
        function parseM3U(data) {
            const lines = data.split('\n');
            let currentChannel = {};
            const groups = new Set();

            lines.forEach(line => {
                line = line.trim();
                if (line.startsWith('#EXTINF:')) {
                    // وەرگرتنی ناوی گرووپ
                    const groupMatch = line.match(/group-title="([^"]+)"/);
                    const group = groupMatch ? groupMatch[1] : 'Uncategorized';
                    groups.add(group);

                    // وەرگرتنی لۆگۆ
                    const logoMatch = line.match(/tvg-logo="([^"]+)"/);
                    const logo = logoMatch ? logoMatch[1] : '';

                    // وەرگرتنی ناوی کەناڵ
                    const nameParts = line.split(',');
                    const name = nameParts[nameParts.length - 1];

                    currentChannel = { name, group, logo };
                } else if (line.startsWith('http')) {
                    currentChannel.url = line;
                    allChannels.push(currentChannel);
                    currentChannel = {};
                }
            });

            // پرکردنەوەی لیستی گرووپەکان
            const select = document.getElementById('groupSelect');
            groups.forEach(g => {
                const opt = document.createElement('option');
                opt.value = g;
                opt.innerText = g;
                select.appendChild(opt);
            });

            renderChannels(allChannels);
        }

        // نیشاندانی کەناڵەکان بە لۆگۆوە لە خوارەوە
        function renderChannels(channels) {
            const list = document.getElementById('channelList');
            list.innerHTML = '';

            channels.slice(0, 200).forEach(ch => { // نمایشکردنی ٢٠٠ کەناڵی سەرەتا
                const li = document.createElement('li');
                li.className = 'channel-item';
                
                const img = document.createElement('img');
                img.src = ch.logo || 'https://via.placeholder.com/50?text=TV';
                img.onerror = () => img.src = 'https://via.placeholder.com/50?text=TV';

                const span = document.createElement('span');
                span.className = 'channel-name';
                span.innerText = ch.name;

                li.appendChild(img);
                li.appendChild(span);

                li.onclick = () => playStream(ch.url, ch.name);
                list.appendChild(li);
            });
        }

        // فلتەرکردن بەپێی گرووپ
        function filterChannels() {
            const selectedGroup = document.getElementById('groupSelect').value;
            if (selectedGroup === 'ALL') {
                renderChannels(allChannels);
            } else {
                const filtered = allChannels.filter(c => c.group === selectedGroup);
                renderChannels(filtered);
            }
        }

        // لێدانی کەناڵەکە
        function playStream(url, name) {
            const video = document.getElementById('videoPlayer');
            video.src = url;
            document.getElementById('status').innerText = "پەخشکردنی: " + name;
        }
    </script>
</body>
</html>
