<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAMAL PRO ULTRA - Direct Access</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --primary: #f0b90b; --bg: #05080a; --sidebar: #0d1117; --border: #1f2937; --card: rgba(255,255,255,0.05); }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; height: 100vh; overflow: hidden; }
        
        /* لابردنی شاشەی پاسۆرد و نیشاندانی ئەپەکە ڕاستەوخۆ */
        .wrapper { display: flex; height: 100vh; }

        .col-groups { width: 240px; background: var(--sidebar); border-left: 1px solid var(--border); display: flex; flex-direction: column; }
        .col-channels { width: 320px; background: var(--sidebar); border-left: 1px solid var(--border); display: flex; flex-direction: column; }
        .col-player { flex: 1; background: #000; display: flex; flex-direction: column; padding: 25px; align-items: center; justify-content: center; }

        .header { padding: 18px; font-size: 0.95rem; font-weight: bold; color: var(--primary); border-bottom: 1px solid var(--border); text-align: center; background: #161b22; }
        .scrollable { flex: 1; overflow-y: auto; padding: 12px; }
        .search-input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #333; background: #161b22; color: white; outline: none; box-sizing: border-box; }

        .group-btn { width: 100%; padding: 14px; background: var(--card); border: none; color: #bbb; cursor: pointer; text-align: right; border-radius: 8px; margin-bottom: 6px; font-size: 0.85rem; transition: 0.2s; }
        .group-btn.active { background: var(--primary); color: black; font-weight: bold; }
        
        .chan-card { display: flex; align-items: center; gap: 12px; padding: 12px; background: var(--card); border-radius: 10px; cursor: pointer; margin-bottom: 8px; border: 1px solid transparent; transition: 0.2s; }
        .chan-card:hover { background: rgba(255,255,255,0.08); }
        .chan-card.active { border-color: var(--primary); background: rgba(240,185,11,0.12); }
        .chan-card img { width: 45px; height: 45px; object-fit: contain; background: white; border-radius: 6px; padding: 3px; }

        .vid-container { width: 100%; max-width: 1100px; background: #000; border-radius: 15px; overflow: hidden; border: 1px solid #222; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        video { width: 100%; aspect-ratio: 16/9; display: block; }
        .now-playing { margin-top: 20px; color: var(--primary); font-size: 1.3rem; font-weight: bold; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #2a2f38; border-radius: 10px; }
        
        .loading-text { text-align: center; padding-top: 50px; color: var(--primary); font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="col-groups">
        <div class="header">📁 گرووپەکان</div>
        <div class="scrollable" id="gList">
            <div class="loading-text">⏳ کەمێک چاوەڕێ بکە...</div>
        </div>
    </div>

    <div class="col-channels">
        <div class="header">📺 کەناڵەکان</div>
        <div style="padding:15px;"><input type="text" id="search" class="search-input" placeholder="گەڕان بۆ کەناڵ..."></div>
        <div class="scrollable" id="cList"></div>
    </div>

    <div class="col-player">
        <div class="vid-container">
            <video id="player" controls autoplay></video>
        </div>
        <div class="now-playing" id="curTitle">KAMAL PRO ULTRA</div>
        <div id="count" style="color:#444; margin-top:10px; font-size:0.8rem;"></div>
    </div>
</div>

<script>
    // لینکە شاردراوەکە (بۆ ئەوەی بە چاو نەدۆزرێتەوە)
    const _0xkey = "aHR0cHM6Ly94dHJlYW0taWUubmV0L2dldC5waHA/dXNlcm5hbWU9aXB0djIwMjYmcGFzc3dvcmQ9aXB0djIwMjYmdHlwZT1tM3VfcGx1cw==";
    
    let allData = [];
    const video = document.getElementById('player');
    let hls = new Hls();

    // فەرمانی بارکردن ڕاستەوخۆ دەست پێ دەکات
    async function loadData() {
        try {
            const r = await fetch(atob(_0xkey));
            const t = await r.text();
            const lines = t.split('\n');
            let item = {};
            lines.forEach(l => {
                if(l.startsWith('#EXTINF:')) {
                    item.name = l.split(',')[1] || "Unnamed";
                    const g = l.match(/group-title="([^"]+)"/i);
                    const i = l.match(/tvg-logo="([^"]+)"/i);
                    item.group = g ? g[1] : "General";
                    item.logo = (i && i[1]) ? i[1] : "";
                } else if(l.startsWith('http')) {
                    item.url = l.trim();
                    allData.push(item);
                    item = {};
                }
            });
            document.getElementById('count').innerText = "Total Channels: " + allData.length;
            renderGroups();
            renderChans(allData);
        } catch(e) { 
            document.getElementById('gList').innerHTML = '<div style="color:red; text-align:center;">⚠️ هەڵە لە پەیوەندی سێرڤەر!</div>';
        }
    }

    function renderGroups() {
        const gs = ["هەمووی", ...new Set(allData.map(x => x.group))];
        document.getElementById('gList').innerHTML = gs.map((g,i) => 
            `<button class="group-btn ${i===0?'active':''}" onclick="filter('${g}', this)">${g}</button>`
        ).join('');
    }

    function renderChans(list) {
        document.getElementById('cList').innerHTML = list.map(x => {
            // ئەگەر لۆگۆی نەبوو، لۆگۆیەکی جوان بە ناوی کەناڵەکە دروست دەکات
            const logoUrl = (x.logo && x.logo.startsWith('http')) 
                ? x.logo 
                : `https://ui-avatars.com/api/?name=${encodeURIComponent(x.name)}&background=f0b90b&color=000&size=128&bold=true`;

            return `
                <div class="chan-card" onclick="play('${x.url}', '${x.name}', this)">
                    <img src="${logoUrl}" onerror="this.src='https://via.placeholder.com/50/0d1117/f0b90b?text=${x.name[0]}'">
                    <span style="font-size:0.85rem;">${x.name}</span>
                </div>
            `;
        }).join('');
    }

    function filter(g, btn) {
        document.querySelectorAll('.group-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderChans(g === "هەمووی" ? allData : allData.filter(x => x.group === g));
    }

    function play(u, n, el) {
        document.querySelectorAll('.chan-card').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('curTitle').innerText = n;
        if(Hls.isSupported()) {
            hls.destroy();
            hls = new Hls();
            hls.loadSource(u);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        } else {
            video.src = u;
            video.play();
        }
    }

    document.getElementById('search').oninput = (e) => {
        const v = e.target.value.toLowerCase();
        renderChans(allData.filter(x => x.name.toLowerCase().includes(v)));
    };

    // لێرەدا بانگی فەرمانی بارکردن دەکەین بێ ئەوەی داوای پاسۆرد بکات
    loadData();
</script>
</body>
</html>
