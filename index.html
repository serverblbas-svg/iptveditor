<!DOCTYPE html>
<html lang="kmr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zaman IPTV Player</title>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, sans-serif; }
        body { display: flex; flex-direction: column; height: 100vh; background: #121212; color: #fff; overflow: hidden; }

        /* بەشی سەرەوە: شاشەی پەخشکردن */
        #main { 
            flex: 0 0 auto; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            background: #000; 
            padding: 10px;
            border-bottom: 2px solid #222;
        }
        video { width: 100%; max-width: 850px; height: 240px; background: #000; outline: none; border-radius: 8px; }
        #status { margin-top: 8px; color: #00bcd4; font-size: 13px; font-weight: bold; text-align: center; }

        /* بەشی خوارەوە: گرووپەکان و لیستی کەناڵەکان */
        #bottom-section { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            background: #1e1e1e; 
            overflow: hidden;
        }
        
        .header { 
            padding: 10px; 
            background: #252525; 
            font-size: 16px; 
            font-weight: bold; 
            text-align: center; 
            color: #00bcd4; 
            border-bottom: 1px solid #333;
        }

        #groupSelect { 
            width: 92%; 
            margin: 10px auto; 
            padding: 10px; 
            background: #2a2a2a; 
            color: #fff; 
            border: 1px solid #444; 
            border-radius: 6px; 
            font-size: 14px;
            outline: none;
        }

        #channelList { 
            flex: 1; 
            overflow-y: auto; 
            list-style: none; 
            padding: 10px; 
        }

        /* شێوازی هەر کەناڵێک */
        .channel-item { 
            display: flex; 
            align-items: center; 
            padding: 10px; 
            border-bottom: 1px solid #2a2a2a; 
            cursor: pointer; 
            transition: 0.2s; 
            border-radius: 6px;
            margin-bottom: 4px;
            background: #222;
        }
        .channel-item:hover { background: #333; }
        .channel-item img { width: 36px; height: 36px; object-fit: contain; margin-right: 12px; background: #000; border-radius: 4px; }
        .channel-name { font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #ddd; }
    </style>
</head>
<body>

    <!-- بەشی سەرەوە (Player) -->
    <div id="main">
        <video id="videoPlayer" controls autoplay></video>
        <div id="status">کەناڵێک هەڵبژێرە بۆ لێدان...</div>
    </div>

    <!-- بەشی خوارەوە (گرووپەکان و کەناڵەکان) -->
    <div id="bottom-section">
        <div class="header">ZAMAN IPTV</div>
        <select id="groupSelect" onchange="filterChannels()">
            <option value="ALL">هەموو گرووپەکان (All Groups)</option>
        </select>
        <ul id="channelList"></ul>
    </div>

    <script>
        const M3U_URL = "https://xtream-ie.net/get.php?username=serverblbas&password=serverblbas&type=m3u_plus";
        let allChannels = [];

        // ڕاکێشانی فایلی M3U
        fetch(M3U_URL)
            .then(res => res.text())
            .then(data => {
                parseM3U(data);
                document.getElementById('status').innerText = "کەناڵەکان بارکران.";
            })
            .catch(err => {
                document.getElementById('status').innerText = "کێشە لە وەگرتنی لینکەکە هەیە (CORS / Network Error).";
            });

        // شیکردنەوەی فایلی M3U
        function parseM3U(data) {
            const lines = data.split('\n');
            let currentChannel = {};
            const groups = new Set();

            lines.forEach(line => {
                line = line.trim();
                if (line.startsWith('#EXTINF:')) {
                    // وەرگرتنی ناوی گرووپ
                    const groupMatch = line.match(/group-title="([^"]+)"/);
                    const group = groupMatch ? groupMatch[1] : 'Uncategorized';
                    groups.add(group);

                    // وەرگرتنی لۆگۆ
                    const logoMatch = line.match(/tvg-logo="([^"]+)"/);
                    const logo = logoMatch ? logoMatch[1] : '';

                    // وەرگرتنی ناوی کەناڵ
                    const nameParts = line.split(',');
                    const name = nameParts[nameParts.length - 1];

                    currentChannel = { name, group, logo };
                } else if (line.startsWith('http')) {
                    currentChannel.url = line;
                    allChannels.push(currentChannel);
                    currentChannel = {};
                }
            });

            // پرکردنەوەی لیستی گرووپەکان
            const select = document.getElementById('groupSelect');
            groups.forEach(g => {
                const opt = document.createElement('option');
                opt.value = g;
                opt.innerText = g;
                select.appendChild(opt);
            });

            renderChannels(allChannels);
        }

        // نیشاندانی کەناڵەکان
        function renderChannels(channels) {
            const list = document.getElementById('channelList');
            list.innerHTML = '';

            channels.slice(0, 300).forEach(ch => { 
                const li = document.createElement('li');
                li.className = 'channel-item';
                
                const img = document.createElement('img');
                img.src = ch.logo || 'https://via.placeholder.com/40?text=TV';
                img.onerror = () => img.src = 'https://via.placeholder.com/40?text=TV';

                const span = document.createElement('span');
                span.className = 'channel-name';
                span.innerText = ch.name;

                li.appendChild(img);
                li.appendChild(span);

                li.onclick = () => playStream(ch.url, ch.name);
                list.appendChild(li);
            });
        }

        // فلتەرکردن بەپێی گرووپ
        function filterChannels() {
            const selectedGroup = document.getElementById('groupSelect').value;
            if (selectedGroup === 'ALL') {
                renderChannels(allChannels);
            } else {
                const filtered = allChannels.filter(c => c.group === selectedGroup);
                renderChannels(filtered);
            }
        }

        // لێدانی کەناڵەکە
        function playStream(url, name) {
            const video = document.getElementById('videoPlayer');
            video.src = url;
            document.getElementById('status').innerText = "پەخشکردنی: " + name;
        }
    </script>
</body>
</html>
