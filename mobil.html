<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KAMAL PRO MOBILE</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Noto+Naskh+Arabic:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #f0b90b;
            --gold-dim: #c9940a;
            --bg: #060a0e;
            --surface: #0b1018;
            --surface2: #121820;
            --surface3: #1a2330;
            --border: rgba(240, 185, 11, 0.12);
            --text: #e8eaf0;
            --text-dim: rgba(232, 234, 240, 0.6);
            --text-muted: rgba(232, 234, 240, 0.35);
            --red: #ff3b30;
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        html, body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Noto Naskh Arabic', sans-serif;
            height: 100%;
            overflow: hidden;
            touch-action: manipulation;
        }

        /* ═══ LOADING ═══ */
        #loader {
            position: fixed; inset: 0; z-index: 9999;
            background: var(--bg);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 16px;
        }
        .load-logo {
            font-family: 'Rajdhani', sans-serif;
            font-size: 2rem; font-weight: 700;
            letter-spacing: 0.2em;
            background: linear-gradient(135deg, var(--gold), #ffe566);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .load-bar {
            width: 140px; height: 3px;
            background: rgba(255,255,255,0.06);
            border-radius: 3px; overflow: hidden;
        }
        .load-bar::after {
            content: ''; display: block;
            width: 40%; height: 100%;
            background: var(--gold);
            border-radius: 3px;
            animation: slide 1.2s ease-in-out infinite;
        }
        @keyframes slide {
            0% { transform: translateX(-150%); }
            100% { transform: translateX(400%); }
        }

        /* ═══ APP SHELL ═══ */
        #app {
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            padding-top: var(--safe-top);
            padding-bottom: var(--safe-bottom);
        }

        /* ═══ TOP BAR ═══ */
        .top-bar {
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            background: rgba(11, 16, 24, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            z-index: 100;
        }
        .top-bar .logo {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.1rem; font-weight: 700;
            color: var(--gold); letter-spacing: 0.1em;
        }
        .top-bar .clock {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.1rem; font-weight: 600;
            color: #fff; direction: ltr;
        }

        /* ═══ PLAYER AREA ═══ */
        .player-section {
            flex-shrink: 0;
            position: relative;
            background: #000;
        }
        video {
            width: 100%;
            aspect-ratio: 16/9;
            display: block;
            background: #000;
        }
        .player-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 12px;
        }
        .live-pill {
            align-self: flex-start;
            background: var(--red);
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.6rem; font-weight: 700;
            letter-spacing: 0.15em;
            padding: 3px 10px;
            border-radius: 4px;
            display: flex; align-items: center; gap: 6px;
            animation: blink 1.5s infinite;
        }
        .live-pill::before {
            content: ''; width: 6px; height: 6px;
            background: #fff; border-radius: 50%;
        }
        @keyframes blink {
            0%,100%{opacity:1} 50%{opacity:0.6}
        }
        .channel-name-overlay {
            align-self: flex-end;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--gold);
            border: 1px solid rgba(240,185,11,0.2);
        }

        /* ═══ SWIPE HINT ═══ */
        .swipe-hint {
            display: flex;
            justify-content: space-between;
            padding: 8px 20px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .swipe-hint span {
            font-size: 0.65rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* ═══ BOTTOM SHEET (CHANNELS) ═══ */
        .sheet-backdrop {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.6);
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s;
            z-index: 200;
        }
        .sheet-backdrop.open { opacity: 1; pointer-events: auto; }

        .sheet {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 75vh;
            background: linear-gradient(180deg, #0f1520 0%, #060a0e 100%);
            border-radius: 20px 20px 0 0;
            border-top: 1px solid var(--border);
            transform: translateY(100%);
            transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
            z-index: 201;
            display: flex; flex-direction: column;
            padding-bottom: var(--safe-bottom);
        }
        .sheet.open { transform: translateY(0); }

        .sheet-handle {
            width: 100%; height: 28px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .sheet-handle::after {
            content: ''; width: 40px; height: 4px;
            background: rgba(255,255,255,0.15);
            border-radius: 4px;
        }

        /* ═══ GROUP CHIPS ═══ */
        .chips-scroll {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 0 16px 12px;
            flex-shrink: 0;
            scrollbar-width: none;
        }
        .chips-scroll::-webkit-scrollbar { display: none; }

        .chip {
            flex-shrink: 0;
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.03);
            color: var(--text-dim);
            font-size: 0.78rem;
            font-family: 'Noto Naskh Arabic', sans-serif;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }
        .chip.active {
            background: rgba(240,185,11,0.15);
            border-color: rgba(240,185,11,0.4);
            color: var(--gold);
            font-weight: 600;
        }

        /* ═══ SEARCH ═══ */
        .search-box {
            padding: 0 16px 12px;
            flex-shrink: 0;
        }
        .search-box input {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 10px 14px;
            color: var(--text);
            font-size: 0.9rem;
            font-family: 'Noto Naskh Arabic', sans-serif;
            outline: none;
        }
        .search-box input::placeholder { color: var(--text-muted); }

        /* ═══ CHANNEL GRID ═══ */
        .channel-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 0 16px 16px;
        }
        .channel-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        @media (min-width: 400px) {
            .channel-grid { grid-template-columns: repeat(4, 1fr); }
        }

        .channel-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            padding: 10px 6px;
            background: var(--surface2);
            border: 1px solid transparent;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.15s;
            position: relative;
        }
        .channel-item:active {
            transform: scale(0.96);
            background: var(--surface3);
        }
        .channel-item.active {
            border-color: var(--gold);
            background: rgba(240,185,11,0.08);
        }
        .channel-item img {
            width: 48px; height: 48px;
            object-fit: contain;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
        }
        .channel-item span {
            font-size: 0.7rem;
            color: var(--text-dim);
            text-align: center;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .channel-item.active span { color: var(--gold); font-weight: 600; }

        .live-dot {
            position: absolute;
            top: 6px; left: 6px;
            width: 7px; height: 7px;
            background: var(--red);
            border-radius: 50%;
            box-shadow: 0 0 6px var(--red);
            animation: blink 1.5s infinite;
            display: none;
        }
        .channel-item.active .live-dot { display: block; }

        /* ═══ FLOATING BUTTON ═══ */
        .fab {
            position: fixed;
            bottom: calc(20px + var(--safe-bottom));
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, var(--gold), #d4a009);
            color: #000;
            border: none;
            border-radius: 28px;
            padding: 12px 28px;
            font-family: 'Noto Naskh Arabic', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 20px rgba(240,185,11,0.3);
            z-index: 150;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .fab:active {
            transform: translateX(-50%) scale(0.95);
            box-shadow: 0 2px 10px rgba(240,185,11,0.2);
        }
        .fab svg { width: 18px; height: 18px; }

        /* ═══ EPG BAR ═══ */
        .epg-bar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 8px 16px;
            flex-shrink: 0;
            display: none;
            align-items: center;
            gap: 8px;
        }
        .epg-bar.visible { display: flex; }
        .epg-bar svg { width: 14px; height: 14px; flex-shrink: 0; }
        .epg-bar span {
            font-size: 0.75rem;
            color: var(--text-dim);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ═══ TOAST ═══ */
        .toast {
            position: fixed;
            top: 70px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: var(--surface3);
            border: 1px solid var(--border);
            color: var(--gold);
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 0.8rem;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s;
            z-index: 300;
            white-space: nowrap;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="load-logo">KAMAL PRO</div>
        <div class="load-bar"></div>
        <p style="font-size:0.75rem;color:var(--text-muted);margin-top:8px;">کەمێک چاوەڕێ بکە...</p>
    </div>

    <div id="app" style="display:none;">
        <!-- TOP BAR -->
        <div class="top-bar">
            <div class="logo">KAMAL PRO</div>
            <div class="clock" id="mClock">00:00</div>
        </div>

        <!-- EPG -->
        <div class="epg-bar" id="epgBar">
            <svg viewBox="0 0 16 16" fill="none" stroke="var(--gold)" stroke-width="1.5">
                <rect x="1" y="2" width="14" height="12" rx="2"/>
                <line x1="1" y1="6" x2="15" y2="6"/>
            </svg>
            <span id="epgText">---</span>
        </div>

        <!-- PLAYER -->
        <div class="player-section">
            <video id="player" controls playsinline></video>
            <div class="player-overlay">
                <div class="live-pill">LIVE</div>
                <div class="channel-name-overlay" id="chanOverlay">KAMAL PRO</div>
            </div>
        </div>

        <!-- SWIPE HINT -->
        <div class="swipe-hint">
            <span>← کەناڵی پێشوو</span>
            <span style="color:var(--gold);font-weight:600;" id="chanIndex">1 / 0</span>
            <span>کەناڵی داهاتوو →</span>
        </div>

        <!-- FAB -->
        <button class="fab" onclick="openSheet()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>
                <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
            </svg>
            لیستی کەناڵەکان
        </button>
    </div>

    <!-- BOTTOM SHEET -->
    <div class="sheet-backdrop" id="backdrop" onclick="closeSheet()"></div>
    <div class="sheet" id="sheet">
        <div class="sheet-handle" onclick="closeSheet()"></div>
        
        <div class="chips-scroll" id="chips"></div>
        
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="گەڕان لە کەناڵەکان..." oninput="doSearch(this.value)">
        </div>
        
        <div class="channel-scroll">
            <div class="channel-grid" id="grid"></div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const M3U_URL = 'https://xtream-ie.net/get.php?username=serverblbas&password=serverblbas&type=m3u_plus';
        const EPG_URL = 'https://xtream-ie.net/xmltv.php?username=serverblbas&password=serverblbas';

        let allData = [];
        let currentList = [];
        let currentIndex = 0;
        let epgData = {};
        let hls = null;
        const video = document.getElementById('player');

        // ═══ INIT ═══
        window.onload = async () => {
            updateClock();
            setInterval(updateClock, 1000);
            
            try {
                const r = await fetch(M3U_URL);
                const txt = await r.text();
                parseM3U(txt);
                fetchEPG();
                document.getElementById('loader').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                if (allData.length > 0) playChannel(0);
            } catch(e) {
                document.querySelector('#loader p').innerHTML = '<span style="color:#ff3b30">هەڵە! ئینتەرنێتەکەت بپشکنە</span>';
            }

            // Swipe gestures
            let touchStartX = 0;
            document.querySelector('.player-section').addEventListener('touchstart', e => {
                touchStartX = e.changedTouches[0].screenX;
            }, {passive:true});
            document.querySelector('.player-section').addEventListener('touchend', e => {
                const diff = touchStartX - e.changedTouches[0].screenX;
                if (Math.abs(diff) > 60) {
                    if (diff > 0 && currentIndex < currentList.length - 1) playChannel(currentIndex + 1);
                    else if (diff < 0 && currentIndex > 0) playChannel(currentIndex - 1);
                }
            }, {passive:true});
        };

        // ═══ CLOCK ═══
        function updateClock() {
            const n = new Date();
            document.getElementById('mClock').innerText = 
                String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0');
        }

        // ═══ PARSE ═══
        function parseM3U(data) {
            const lines = data.split('\n');
            let obj = {};
            allData = [];
            lines.forEach(l => {
                if (l.startsWith('#EXTINF:')) {
                    obj.name = l.split(',')[1]?.trim() || "Channel";
                    const g = l.match(/group-title="([^"]+)"/i);
                    const im = l.match(/tvg-logo="([^"]+)"/i);
                    const cid = l.match(/tvg-id="([^"]+)"/i);
                    obj.group = g ? g[1] : "General";
                    obj.logo = im ? im[1] : "";
                    obj.id = cid ? cid[1] : "";
                } else if (l.startsWith('http')) {
                    obj.url = l.trim();
                    allData.push(obj);
                    obj = {};
                }
            });
            renderGroups();
            currentList = [...allData];
            renderGrid(currentList);
        }

        async function fetchEPG() {
            try {
                const res = await fetch(EPG_URL);
                const text = await res.text();
                const xml = new DOMParser().parseFromString(text, "text/xml");
                const progs = xml.getElementsByTagName("programme");
                for (let p of progs) {
                    const cid = p.getAttribute("channel");
                    const title = p.getElementsByTagName("title")[0]?.textContent || "";
                    if (!epgData[cid]) epgData[cid] = [];
                    epgData[cid].push(title);
                }
            } catch(e) {}
        }

        // ═══ RENDER ═══
        function renderGroups() {
            const gs = ["هەمووی", ...new Set(allData.map(x => x.group))];
            document.getElementById('chips').innerHTML = gs.map((g, i) => 
                `<div class="chip ${i===0?'active':''}" onclick="filterGroup('${g.replace(/'/g,"\\'")}', this)">${g}</div>`
            ).join('');
        }

        function renderGrid(list) {
            document.getElementById('grid').innerHTML = list.map((ch, i) => {
                const img = ch.logo || `https://ui-avatars.com/api/?name=${encodeURIComponent(ch.name)}&background=1a2030&color=f0b90b&bold=true&size=80`;
                const isActive = currentList[currentIndex]?.url === ch.url;
                return `
                <div class="channel-item ${isActive?'active':''}" onclick="playFromSheet(${i})">
                    <div class="live-dot"></div>
                    <img src="${img}" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(ch.name)}&background=1a2030&color=f0b90b&bold=true&size=80'">
                    <span>${ch.name}</span>
                </div>`;
            }).join('');
            updateIndex();
        }

        // ═══ PLAY ═══
        function playChannel(index) {
            if (index < 0 || index >= currentList.length) return;
            currentIndex = index;
            const ch = currentList[index];
            
            document.getElementById('chanOverlay').innerText = ch.name;
            showToast(ch.name);
            
            // EPG
            const epgBar = document.getElementById('epgBar');
            const epgText = document.getElementById('epgText');
            if (ch.id && epgData[ch.id] && epgData[ch.id].length > 0) {
                epgText.innerText = 'ئێستا: ' + epgData[ch.id][0];
                epgBar.classList.add('visible');
            } else {
                epgBar.classList.remove('visible');
            }

            // HLS
            if (Hls.isSupported()) {
                if (hls) hls.destroy();
                hls = new Hls({ enableWorker: true, lowLatencyMode: true });
                hls.loadSource(ch.url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(()=>{}));
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = ch.url;
                video.play().catch(()=>{});
            }

            // Update grid highlight
            renderGrid(currentList);
            updateIndex();
        }

        function playFromSheet(index) {
            playChannel(index);
            closeSheet();
        }

        function updateIndex() {
            document.getElementById('chanIndex').innerText = (currentIndex + 1) + ' / ' + currentList.length;
        }

        // ═══ FILTER ═══
        function filterGroup(g, el) {
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            currentList = (g === "هەمووی") ? [...allData] : allData.filter(x => x.group === g);
            currentIndex = 0;
            renderGrid(currentList);
            playChannel(0);
        }

        function doSearch(q) {
            const term = q.trim().toLowerCase();
            const filtered = currentList.filter(x => x.name.toLowerCase().includes(term));
            renderGrid(filtered);
        }

        // ═══ SHEET ═══
        function openSheet() {
            document.getElementById('backdrop').classList.add('open');
            document.getElementById('sheet').classList.add('open');
        }
        function closeSheet() {
            document.getElementById('backdrop').classList.remove('open');
            document.getElementById('sheet').classList.remove('open');
        }

        // ═══ TOAST ═══
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = '▶ ' + msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }
    </script>
</body>
</html>
