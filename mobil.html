<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KAMAL IPTV MOBILE</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { 
            --primary: #f0b90b; 
            --bg: #05080a; 
            --sidebar: #0d1117; 
            --border: #1f2937; 
            --glass: rgba(255, 255, 255, 0.07);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            margin: 0; 
            padding: 0; 
            height: 100vh; 
            overflow: hidden; 
            -webkit-font-smoothing: antialiased;
        }
        
        /* شاشەی بارکردن */
        #loadingOverlay { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: #000; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            z-index: 10000; 
        }
        .spinner { 
            border: 4px solid rgba(255,255,255,0.1); 
            width: 50px; 
            height: 50px; 
            border-radius: 50%; 
            border-left-color: var(--primary); 
            animation: spin 1s linear infinite; 
        }
        @keyframes spin { 
            0% { transform: rotate(0deg); } 
            100% { transform: rotate(360deg); } 
        }

        .main-container { 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            padding: 10px; 
            justify-content: flex-start; 
            align-items: center; 
        }
        
        /* 📱 هێڵی زانیاری شووشەیی مۆدێرن */
        .phone-style-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            background: linear-gradient(135deg, rgba(240, 185, 11, 0.1), rgba(255, 255, 255, 0.05));
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 16px;
            border-radius: 20px;
            margin-bottom: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }
        
        .phone-time-section { display: flex; flex-direction: column; align-items: flex-start; }
        .phone-clock { 
            font-size: 1.3rem; 
            font-weight: 700; 
            color: #ffffff; 
            line-height: 1.2; 
            letter-spacing: 1px;
        }
        .phone-date { 
            font-size: 0.7rem; 
            color: rgba(255, 255, 255, 0.7); 
            margin-top: 2px; 
        }
        
        .phone-weather-section { 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            background: rgba(0, 0, 0, 0.3); 
            padding: 6px 12px; 
            border-radius: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            transition: opacity 0.4s ease-in-out;
        }
        .phone-temp { 
            font-size: 1.1rem; 
            font-weight: 800; 
            color: var(--primary); 
        }
        .phone-city-details { 
            display: flex; 
            flex-direction: column; 
            font-size: 0.7rem; 
            text-align: right; 
        }
        .phone-gregorian-date { 
            color: rgba(240, 185, 11, 0.85); 
            font-size: 0.65rem; 
        }

        /* ڤیدیۆ پلەیەر */
        video { 
            width: 100%; 
            aspect-ratio: 16/9; 
            border-radius: 16px; 
            border: 1px solid var(--border); 
            background: #000; 
            box-shadow: 0 8px 25px rgba(0,0,0,0.6); 
        }
        
        /* دوگمەکانی خوار ڤیدیۆکە */
        .mobile-controls { 
            display: flex; 
            gap: 12px; 
            width: 100%; 
            margin: 14px 0; 
        }
        .mobile-btn { 
            flex: 1; 
            background: linear-gradient(145deg, #111720, #0d1117); 
            border: 1px solid var(--border); 
            color: #fff; 
            padding: 16px; 
            font-weight: bold; 
            border-radius: 14px; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 8px; 
            font-size: 0.95rem; 
            transition: all 0.2s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .mobile-btn:active { 
            background: var(--primary); 
            color: #000; 
            border-color: var(--primary); 
            transform: scale(0.96);
        }

        /* مینیوەکانی مۆبایل (دێنە سەرەوە لە خوارەوە) */
        .bottom-sheet { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            width: 100%; 
            height: 70vh; 
            background: linear-gradient(180deg, #0d1117, #05080a); 
            z-index: 999; 
            border-radius: 28px 28px 0 0; 
            border-top: 2px solid var(--primary); 
            transform: translateY(100%); 
            transition: transform 0.35s cubic-bezier(0.1, 0.76, 0.55, 0.94);
            display: flex; 
            flex-direction: column; 
            box-shadow: 0 -10px 40px rgba(0,0,0,0.8);
        }
        .bottom-sheet.open { transform: translateY(0); }
        
        .sheet-header { 
            padding: 18px 20px; 
            font-size: 1.05rem; 
            font-weight: bold; 
            color: var(--primary); 
            border-bottom: 1px solid var(--border); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        .sheet-close { 
            background: rgba(255,255,255,0.08); 
            border: none; 
            color: #ff4444; 
            font-size: 1.2rem; 
            border-radius: 50%; 
            width: 36px; 
            height: 36px; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        .sheet-content { 
            flex: 1; 
            overflow-y: auto; 
            padding: 14px; 
        }
        
        /* مینیوی گرووپ و کەناڵەکان لەسەر مۆبایل */
        .group-btn { 
            width: 100%; 
            padding: 16px; 
            background: rgba(255,255,255,0.04); 
            border: none; 
            color: #ccc; 
            cursor: pointer; 
            text-align: right; 
            border-radius: 12px; 
            margin-bottom: 8px; 
            font-size: 0.95rem; 
            transition: all 0.2s;
        }
        .group-btn:active { background: rgba(240,185,11,0.15); }
        .group-btn.active-group { 
            background: linear-gradient(90deg, var(--primary), #d4a009) !important; 
            color: black !important; 
            font-weight: bold; 
            box-shadow: 0 4px 15px rgba(240, 185, 11, 0.3);
        }

        .chan-card { 
            display: flex; 
            align-items: center; 
            gap: 14px; 
            padding: 14px; 
            background: rgba(255,255,255,0.04); 
            border-radius: 14px; 
            cursor: pointer; 
            margin-bottom: 8px; 
            transition: all 0.2s;
            border: 1px solid rgba(255,255,255,0.02);
        }
        .chan-card:active { 
            background: rgba(255,255,255,0.08); 
            transform: scale(0.98);
        }
        .chan-card img { 
            width: 42px; 
            height: 42px; 
            object-fit: contain; 
            background: white; 
            border-radius: 8px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .chan-card span { 
            font-size: 0.95rem; 
            font-weight: 500;
        }
        .chan-card.active-channel { 
            background: linear-gradient(90deg, rgba(240,185,11,0.2), rgba(240,185,11,0.05)) !important; 
            border-right: 4px solid var(--primary); 
            color: var(--primary) !important; 
            font-weight: bold; 
        }
        
        .epg-info { 
            font-size: 0.85rem; 
            color: #aaa; 
            background: rgba(255, 255, 255, 0.04); 
            padding: 10px; 
            border-radius: 10px; 
            display: none; 
            width: 100%; 
            text-align: center; 
            border: 1px solid rgba(255,255,255,0.02); 
            margin-top: 8px;
        }

        /* خەڵفی تاریک بۆ تەڵخکردنی پشتەوە */
        .overlay { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.6); 
            z-index: 990; 
            backdrop-filter: blur(4px); 
            -webkit-backdrop-filter: blur(4px); 
        }
        .overlay.show { display: block; }
        
        /* ئەنیمەیشنی لۆدین */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .loading-pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>
</head>
<body>

<div id="loadingOverlay">
    <div class="spinner"></div>
    <h2 style="color:var(--primary); margin-top:20px; font-size: 1.4rem; letter-spacing: 2px;">KAMAL PRO</h2>
    <p id="loadingStatus" style="font-size:0.8rem; color:#888; margin-top:8px;">کەمێک چاوەڕێ بکە بۆ بارکردنی کەناڵەکان...</p>
</div>

<div class="overlay" id="screenOverlay" onclick="closeSheets()"></div>

<div class="main-container">
    
    <div class="phone-style-bar">
        <div class="phone-time-section">
            <div id="pClock" class="phone-clock">00:00:00</div>
            <div id="pDates" class="phone-date">بار دەکات...</div>
        </div>
        
        <div id="pWeatherBox" class="phone-weather-section">
            <span id="pIcon" style="font-size: 1.3rem;">☀️</span>
            <div class="phone-city-details">
                <div><span id="pCity" style="font-weight: bold; color: #fff;">هەولێر</span> • <span id="pDesc" style="color: rgba(255,255,255,0.6); font-size: 0.65rem;">Clear</span></div>
                <span id="pGregorian" class="phone-gregorian-date">بار دەکات...</span>
            </div>
            <span id="pTemp" class="phone-temp">--°C</span>
        </div>
    </div>

    <video id="player" controls autoplay playsinline></video>
    <div id="title" style="margin: 12px 0; color:var(--primary); font-weight:bold; font-size:1.1rem; text-align:center;">KAMAL PRO ULTRA</div>
    <div id="epgDisplay" class="epg-info"></div>

    <div class="mobile-controls">
        <button class="mobile-btn" onclick="openSheet('groups')">📁 گرووپەکان</button>
        <button class="mobile-btn" onclick="openSheet('channels')">📺 کەناڵەکان</button>
    </div>
</div>

<div class="bottom-sheet" id="sheetGroups">
    <div class="sheet-header">
        <span>📁 هەڵبژاردنی گرووپ</span>
        <button class="sheet-close" onclick="closeSheets()">✕</button>
    </div>
    <div class="sheet-content" id="gList"></div>
</div>

<div class="bottom-sheet" id="sheetChannels">
    <div class="sheet-header">
        <span>📺 لیستی کەناڵەکان</span>
        <button class="sheet-close" onclick="closeSheets()">✕</button>
    </div>
    <div class="sheet-content" id="cList"></div>
</div>

<script>
    const M3U_URL = "https://xtream-ie.net/get.php?username=iptv2026&password=iptv2026&type=m3u_plus";
    const EPG_URL = "https://xtream-ie.net/xmltv.php?username=iptv2026&password=iptv2026";
    
    let allData = [];
    let epgData = {};
    const video = document.getElementById('player');
    let hls = new Hls();
    let currentActiveUrl = "";

    const kurdistanCities = [
        { name: "هەولێر", lat: 36.1911, lon: 44.0092 },
        { name: "سلێمانی", lat: 35.5612, lon: 45.4385 },
        { name: "دهۆک", lat: 36.8601, lon: 42.9891 },
        { name: "کەرکووک", lat: 35.4681, lon: 44.3922 },
        { name: "هەڵەبجە", lat: 35.1778, lon: 45.9861 }
    ];

    const weatherCodes = {
        0: { text: 'Clear Sky', icon: '☀️' }, 1: { text: 'Mainly Clear', icon: '🌤️' },
        2: { text: 'Partly Cloudy', icon: '⛅' }, 3: { text: 'Cloudy', icon: '☁️' },
        45: { text: 'Foggy', icon: '🌫️' }, 48: { text: 'Foggy', icon: '🌫️' },
        51: { text: 'Light Drizzle', icon: '🌦️' }, 53: { text: 'Moderate Drizzle', icon: '🌦️' },
        55: { text: 'Dense Drizzle', icon: '🌧️' }, 61: { text: 'Slight Rain', icon: '🌧️' },
        63: { text: 'Moderate Rain', icon: '🌧️' }, 65: { text: 'Heavy Rain', icon: '⛈️' },
        71: { text: 'Slight Snow', icon: '🌨️' }, 73: { text: 'Moderate Snow', icon: '❄️' },
        75: { text: 'Heavy Snow', icon: '❄️' }, 80: { text: 'Light Showers', icon: '🌦️' },
        81: { text: 'Moderate Showers', icon: '🌧️' }, 82: { text: 'Heavy Showers', icon: '⛈️' },
        95: { text: 'Thunderstorm', icon: '⛈️' }
    };

    let cachedWeather = {};
    let currentCityIndex = 0;

    window.onload = function() {
        startLoading();
        fetchLiveWeather().then(() => showMiniWeather(0));
        setInterval(fetchLiveWeather, 300000);
        updateUiDateTime();
        setInterval(updateUiDateTime, 1000);
        setInterval(cycleWeather, 5000);
    };

    function openSheet(type) {
        closeSheets();
        document.getElementById('screenOverlay').classList.add('show');
        if(type === 'groups') document.getElementById('sheetGroups').classList.add('open');
        if(type === 'channels') document.getElementById('sheetChannels').classList.add('open');
    }

    function closeSheets() {
        document.getElementById('sheetGroups').classList.remove('open');
        document.getElementById('sheetChannels').classList.remove('open');
        document.getElementById('screenOverlay').classList.remove('show');
    }

    async function fetchLiveWeather() {
        for (let i = 0; i < kurdistanCities.length; i++) {
            const city = kurdistanCities[i];
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${city.lat}&longitude=${city.lon}&current=temperature_2m,weather_code&timezone=Asia/Baghdad`);
                if(res.ok) {
                    const data = await res.json();
                    const info = weatherCodes[data.current.weather_code] || { text: 'Clear Sky', icon: '☀️' };
                    cachedWeather[i] = { 
                        name: city.name, 
                        temp: `${Math.round(data.current.temperature_2m)}°C`, 
                        desc: info.text, 
                        icon: info.icon 
                    };
                }
            } catch(e) { console.log("Weather fetch error"); }
        }
    }

    function showMiniWeather(index) {
        const data = cachedWeather[index];
        if(!data) return;
        document.getElementById('pCity').innerText = data.name;
        document.getElementById('pTemp').innerText = data.temp;
        document.getElementById('pDesc').innerText = data.desc;
        document.getElementById('pIcon').innerText = data.icon;
    }

    function cycleWeather() {
        const el = document.getElementById('pWeatherBox');
        if(!el) return;
        el.style.opacity = 0;
        setTimeout(() => {
            currentCityIndex = (currentCityIndex + 1) % kurdistanCities.length;
            showMiniWeather(currentCityIndex);
            el.style.opacity = 1;
        }, 400);
    }

    function getKurdishDate(date) {
        const kurdishMonths = ["خاکەلێوە", "بانەمەڕ", "جۆزەردان", "پوشپەڕ", "گەلاوێژ", "خەرمانان", "ڕەزبەر", "گەڵاڕێزان", "سەرماوەز", "بەفرانبار", "ڕێبەندان", "ڕەشەمە"];
        try {
            const PersianFormatter = new Intl.DateTimeFormat('en-US-u-ca-persian', { day: 'numeric', month: 'numeric', year: 'numeric' });
            const parts = PersianFormatter.format(date).split('/');
            let kYear = parseInt(parts[2]) + 1321; 
            return `${parseInt(parts[1])}ی ${kurdishMonths[parseInt(parts[0]) - 1]}ی ${kYear}`;
        } catch (e) { return "٥ی جۆزەردانی ٢٧٢٦"; }
    }

    function getGregorianDateStr(date) {
        const months = ["کانوونی دووەم", "شوبات", "ئازار", "نیسان", "ئایار", "حوزەیران", "تەممووز", "ئاب", "ئەیلوول", "تشرینی یەکەم", "تشرینی دووەم", "کانوونی یەکەم"];
        return `${date.getDate()}ی ${months[date.getMonth()]}ی ${date.getFullYear()}`;
    }

    function updateUiDateTime() {
        const now = new Date();
        document.getElementById('pClock').innerText = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;
        
        let hijriStr = "";
        try {
            hijriStr = new Intl.DateTimeFormat('ar-SA', { calendar: 'islamic-umalqura', day: 'numeric', month: 'long', year: 'numeric' }).format(now).replace('هـ', 'کۆچی');
        } catch (e) { hijriStr = "٨ ذو الحجة ١٤٤٧ کۆچی"; }

        document.getElementById('pDates').innerText = `${hijriStr} ❖ ${getKurdishDate(now)}`;
        document.getElementById('pGregorian').innerText = getGregorianDateStr(now);
    }

    async function startLoading() {
        try {
            const r = await fetch(M3U_URL);
            const d = await r.text();
            parseM3U(d);
            await fetchEPG();
            document.getElementById('loadingOverlay').style.display = 'none';
        } catch(e) { 
            document.getElementById('loadingStatus').innerHTML = "<span style='color:#ff4444;'>خەتایەک لە هێنانەوەی مەلەفەکە هەیە!</span>";
            console.error(e);
        }
    }

    async function fetchEPG() {
        try {
            const res = await fetch(EPG_URL);
            const text = await res.text();
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(text, "text/xml");
            const programmes = xmlDoc.getElementsByTagName("programme");
            
            for (let i = 0; i < programmes.length; i++) {
                const prog = programmes[i];
                const channelId = prog.getAttribute("channel");
                const title = prog.getElementsByTagName("title")[0]?.textContent || "";
                if (!epgData[channelId]) epgData[channelId] = [];
                epgData[channelId].push({ title });
            }
        } catch (e) { console.log("EPG non-critical error"); }
    }

    function parseM3U(data) {
        const lines = data.split('\n');
        let obj = {}; 
        allData = []; 
        lines.forEach(l => {
            if(l.startsWith('#EXTINF:')) {
                obj.name = l.split(',')[1] || "Channel";
                const g = l.match(/group-title="([^"]+)"/i);
                const i = l.match(/tvg-logo="([^"]+)"/i);
                const cid = l.match(/tvg-id="([^"]+)"/i);
                obj.group = g ? g[1] : "General";
                obj.logo = i ? i[1] : "";
                obj.id = cid ? cid[1] : "";
            } else if(l.startsWith('http')) {
                obj.url = l.trim(); 
                allData.push(obj); 
                obj = {};
            }
        });
        renderG();
        if(allData.length > 0) filter("هەمووی", null);
    }

    function renderG() {
        const gs = ["هەمووی", ...new Set(allData.map(x => x.group))];
        document.getElementById('gList').innerHTML = gs.map(g => 
            `<button class="group-btn" onclick="filter('${g.replace(/'/g, "\\'")}', this)">${g}</button>`
        ).join('');
    }

    function renderC(list) {
        document.getElementById('cList').innerHTML = list.map(x => {
            const img = (x.logo) ? x.logo : `https://ui-avatars.com/api/?name=${encodeURIComponent(x.name)}&background=f0b90b&color=000&bold=true`;
            const isActive = (x.url === currentActiveUrl) ? 'active-channel' : '';
            const safeName = x.name.replace(/'/g, "\\'");
            const safeId = x.id.replace(/'/g, "\\'");
            return `<div class="chan-card ${isActive}" onclick="play('${x.url}', '${safeName}', '${safeId}', this)">
                        <img src="${img}" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(x.name)}&background=f0b90b&color=000&bold=true'">
                        <span>${x.name}</span>
                    </div>`;
        }).join('');
    }

    function play(u, n, id, element) {
        currentActiveUrl = u;
        document.getElementById('title').innerText = n;
        document.querySelectorAll('.chan-card').forEach(c => c.classList.remove('active-channel'));
        if(element) element.classList.add('active-channel');

        const epgDisplay = document.getElementById('epgDisplay');
        if(id && epgData[id] && epgData[id].length > 0) {
            epgDisplay.innerText = `📺 ئێستا پێشکەش دەکرێت: ${epgData[id][0].title}`;
            epgDisplay.style.display = "block";
        } else {
            epgDisplay.style.display = "none";
        }

        if(Hls.isSupported()) { 
            hls.destroy(); 
            hls = new Hls(); 
            hls.loadSource(u); 
            hls.attachMedia(video); 
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play()); 
        }
        else if (video.canPlayType('application/vnd.apple.mpegurl')) { 
            video.src = u; 
            video.play(); 
        }
        
        closeSheets();
    }

    function filter(g, btnElement) {
        document.querySelectorAll('.group-btn').forEach(b => b.classList.remove('active-group'));
        if(btnElement) btnElement.classList.add('active-group');
        renderC(g === "هەمووی" ? allData : allData.filter(x => x.group === g));
        
        if(btnElement) {
            openSheet('channels');
        }
    }
</script>
</body>
</html>
